apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mysql
spec:
  serviceName: "mysql"
  replicas: 3
  selector:
    matchLabels:
      app: mysql
  template:
    metadata:
      labels:
        app: mysql
    spec:
      initContainers:
      - name: init-mysql
        image: mysql
        command:
          - "/bin/sh"
          - "-c"
          - |
            if [[ $(hostname) == "mysql-0" ]]; then
              echo "Configuring as master node"

              # Initialize master settings if needed here
              # Set server-id to 1, enable binary logging for master
              
              echo "[mysqld]\nserver-id=1\nlog-bin=mysql-bin" > /etc/mysql/conf.d/my.cnf
              
              # Wait for MySQL to be ready

              until mysqladmin ping -h localhost --silent; do sleep 5; done

              # Create replication user on master

              mysql -uroot -p$MYSQL_ROOT_PASSWORD -e "
                CREATE USER IF NOT EXISTS 'replica_user'@'%' IDENTIFIED BY '$MYSQL_REPLICATION_PASSWORD';
                GRANT REPLICATION SLAVE ON *.* TO 'replica_user'@'%';
                FLUSH PRIVILEGES;"
            else
              echo "Configuring as replica node"

              # Set server-id uniquely for each replica
              
              SERVER_ID=$(($(echo ${HOSTNAME##*-}) + 1))
              echo "[mysqld]\nserver-id=$SERVER_ID" > /etc/mysql/conf.d/my.cnf
              
              # Wait for the master (mysql-0) to be ready
              until mysqladmin ping -h mysql-0.mysql --silent; do sleep 5; done

              # Configure replication using the dedicated replica_user
              mysql -ureplica_user -p$MYSQL_REPLICATION_PASSWORD -h mysql-0.mysql -e "
                CHANGE MASTER TO 
                  MASTER_HOST='mysql-0.mysql', 
                  MASTER_USER='replica_user', 
                  MASTER_PASSWORD='$MYSQL_REPLICATION_PASSWORD', 
                  MASTER_LOG_FILE='mysql-bin.000001', 
                  MASTER_LOG_POS=4;
                START SLAVE;"
            fi
        env:
        - name: MYSQL_ROOT_PASSWORD
          value: password
        - name: MYSQL_REPLICATION_PASSWORD
          value: password
        volumeMounts:
        - name: mysql-persistent-storage
          mountPath: /var/lib/mysql
      containers:
      - name: mysql
        image: mysql:8.0
        ports:
        - containerPort: 3306
          name: mysql
        env:
        - name: MYSQL_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mysql-secret
              key: MYSQL_ROOT_PASSWORD
        - name: MYSQL_REPLICATION_USER
          value: "replica_user"
        - name: MYSQL_REPLICATION_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mysql-secret
              key: MYSQL_REPLICATION_PASSWORD
        volumeMounts:
        - name: mysql-persistent-storage
          mountPath: /var/lib/mysql
  volumeClaimTemplates:
  - metadata:
      name: mysql-persistent-storage
    spec:
      accessModes: ["ReadWriteOnce"]
      resources:
        requests:
          storage: 1Gi
