apiVersion: v1
kind: Pod
metadata:
  name: multi-container-pod
  namespace: default
  labels:
    app: webapp
    tier: frontend
spec:
  containers:
    # Container 1: Main Web Application
    - name: web-container
      image: nginx:latest
      ports:
        - containerPort: 80
          name: http
      resources:
        requests:
          cpu: 100m
          memory: 128Mi
        limits:
          cpu: 500m
          memory: 512Mi
      volumeMounts:
        - name: shared-data
          mountPath: /usr/share/nginx/html
      env:
        - name: APP_ENV
          value: "production"

    # Container 2: Sidecar Logging Container
    - name: logging-sidecar
      image: busybox:latest
      command: 
        - /bin/sh
        - -c
        - |
          while true
          do
            echo "Log entry at $(date)" >> /logs/app.log
            sleep 10
          done
      resources:
        requests:
          cpu: 50m
          memory: 64Mi
        limits:
          cpu: 200m
          memory: 256Mi
      volumeMounts:
        - name: log-volume
          mountPath: /logs

    # Container 3: Initialize/Config Container
    - name: config-container
      image: alpine:latest
      command: 
        - /bin/sh
        - -c
        - |
          echo "Initializing configuration..."
          echo "<h1>Welcome to Multi-Container Pod</h1>" > /data/index.html
          sleep infinity
      resources:
        requests:
          cpu: 50m
          memory: 64Mi
        limits:
          cpu: 200m
          memory: 256Mi
      volumeMounts:
        - name: shared-data
          mountPath: /data

  # Pod-level configuration
  restartPolicy: Always
  
  # Volumes shared between containers
  volumes:
    - name: shared-data
      emptyDir: {}
    - name: log-volume
      emptyDir: {}

  # DNS configuration
  dnsPolicy: ClusterFirst
  
  # Node affinity (optional)
  nodeSelector: {}

  # Tolerations (optional)
  tolerations: []

  # Service Account
  serviceAccountName: default
