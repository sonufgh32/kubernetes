apiVersion: v1
kind: Service
metadata:
  name: usermgmt-restapp-service
  namespace: dev1
  labels:
    app: usermgmt-restapp
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-type: nlb
spec:
  type: LoadBalancer
  selector: 
    app: usermgmt-restapp
  ports: 
    - port: 80
      targetPort: 8095
      # nodePort: 31200