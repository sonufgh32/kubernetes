apiVersion: apps/v1
kind: ReplicaSet
metadata:
  name: myapp-replicas
spec:
  replicas: 3
  selector:
    matchLabels:
      app: myapp2
  template:
    metadata:
      name: my-app2
      labels:
        app: myapp2
    spec:
      containers:
        - name: myapp
          image: nginx:latest
          ports:
            - containerPort: 80